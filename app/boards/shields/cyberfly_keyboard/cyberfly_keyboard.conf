# Enable bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_PAIRED=6

# Force BLE device name - don't load from NVS (prevents stale name cache)
CONFIG_BT_DEVICE_NAME_DYNAMIC=n
CONFIG_BT_DEVICE_NAME_GATT_WRITABLE=n
CONFIG_BT_DEVICE_NAME_MAX=20

# Enable USB
CONFIG_ZMK_USB=y

# USB device descriptors
CONFIG_USB_DEVICE_MANUFACTURER="CyberFly"
CONFIG_USB_DEVICE_PRODUCT="CyberFly Keyboard"
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0x0001

# Backlight (PWM via AP3032 boost driver on P0.15)
CONFIG_PWM=y
CONFIG_LED_PWM=y
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y
CONFIG_ZMK_BACKLIGHT_BRT_STEP=20
CONFIG_ZMK_BACKLIGHT_BRT_START=20
CONFIG_ZMK_BACKLIGHT_ON_START=n

# External power control (P0.13 -> LDO CE)
CONFIG_ZMK_EXT_POWER=y

# P0.09 (COL4) and P0.10 (COL5) are NFC pins by default - must release for GPIO
CONFIG_NFCT_PINS_AS_GPIOS=y

# Dome sheet debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10
CONFIG_ZMK_KSCAN_MATRIX_WAIT_BEFORE_INPUTS=10

# Battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y

# RGB status LED
CONFIG_CYBERFLY_RGB_STATUS_LED=y

# Mouse keys
CONFIG_ZMK_POINTING=y

# ZMK Studio - live keymap editing over USB/BLE
CONFIG_ZMK_STUDIO=y
